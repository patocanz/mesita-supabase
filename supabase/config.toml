# Supabase project config — Mesita
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "yjalywfzdelacdzccpgb"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
# MFA — required only for admin sign-in, kept available so managers can
# enrol if they want. Admin-side enforcement lives in admin-signin-email.
enable_manual_linking = false

# Email — password only. No magic link, no email OTP. Guests don't get
# email auth at all; manager + admin live here.
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Phone — Twilio Verify, Mexico template at signup. Guests + staff sign
# in here; managers + admins never see this provider.
[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your Mesita code is {{ .Code }}"
max_frequency = "60s"

[auth.sms.twilio]
enabled = true
account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

# OAuth providers — all explicitly disabled. Spec: no Google, no Apple.
[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"

# Per-function overrides. Naming rule: who-verb-nouns (e.g. manager-create-unit,
# guest-list-tickets). All functions verify the JWT except the truly public
# catalog reads, which rely on RLS to gate visibility instead.
#
# --- Auth (post-signin housekeeping per role) ---

# Sign-in EFs run AFTER the Supabase Auth call lands a session. They set
# app_metadata.role, create the corresponding profile row, and (admin)
# enforce @canzeco.com + MFA. verify_jwt=true gates each to a real session.

[functions.guest-signin-phone]
verify_jwt = true

[functions.staff-accept-invite]
verify_jwt = true

[functions.manager-signin-email]
verify_jwt = true

[functions.admin-signin-email]
verify_jwt = true

# Tiny session-check used by the admin web's app shell.
[functions.admin-whoami]
verify_jwt = true

# --- Guest (public reads + authed writes) ---

# Public catalog reads. RLS enforces which venue statuses are visible.
[functions.guest-list-venues]
verify_jwt = false

[functions.guest-get-venue]
verify_jwt = false

# Authed guest writes / reads tied to the signed-in guest's own data.
[functions.guest-get-profile]
verify_jwt = true

[functions.guest-update-profile]
verify_jwt = true

[functions.guest-list-tickets]
verify_jwt = true

[functions.guest-submit-story]
verify_jwt = true

# --- Manager (all authed) ---

# Identity
[functions.manager-get-profile]
verify_jwt = true

[functions.manager-create-profile]
verify_jwt = true

# Unit (venue) lifecycle
[functions.manager-list-units]
verify_jwt = true

[functions.manager-create-unit]
verify_jwt = true

[functions.manager-update-unit]
verify_jwt = true

# One-shot dashboard bundle: user + venues + active venue + recent tickets.
[functions.manager-get-overview]
verify_jwt = true

# Ticket workflow
[functions.manager-create-ticket]
verify_jwt = true

[functions.manager-list-tickets]
verify_jwt = true

[functions.manager-mark-paid]
verify_jwt = true

[functions.manager-cancel-ticket]
verify_jwt = true

[functions.manager-verify-story]
verify_jwt = true

# Guest lookup at the table (resolve 6-char code → name + balance).
[functions.manager-find-guest]
verify_jwt = true

# Google Places proxies. Keep the platform key server-side.
[functions.manager-suggest-places]
verify_jwt = true

[functions.manager-get-place]
verify_jwt = true

# --- Admin (gated by x-admin-key header, not JWT) ---
#
# Admin EFs now sit behind verify_jwt=true. The admin app signs in as a
# real Supabase user (Google OAuth) and the EFs check the caller's JWT
# email against public.super_admins. The legacy x-admin-key /
# ADMIN_ACCESS_KEY pattern was retired in the super_admins cutover.

# Bulk Google Places Text Search proxy. Many queries in, deduped
# Place IDs out.
[functions.admin-search-places]
verify_jwt = true

# Resolve a Google Place ID to a Mesita venue. Powers the admin console's
# super-admin deep-link generator.
[functions.admin-find-venue]
verify_jwt = true
