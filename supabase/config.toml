# --- Admin (Supabase Auth + super_admins allowlist) ---
#
# Operators sign in as themselves (Google OAuth via the admin web).
# Each EF re-checks the caller's JWT email against public.super_admins
# before doing anything privileged.

# Tiny session-check used by the admin web's app shell.
[functions.admin-whoami]
verify_jwt = true

# Ownership-verification queue surface for super-admins.
[functions.admin-list-verifications]
verify_jwt = true

[functions.admin-decide-verification]
verify_jwt = true

[functions.admin-set-auto-verify]
verify_jwt = true

# Bulk Google Places Text Search proxy. Many queries in, deduped
# Place IDs out.
[functions.admin-search-places]
verify_jwt = true

# Resolve a Google Place ID to a Mesita venue. Powers the admin
# console's "open in business" link generator.
[functions.admin-find-venue]
verify_jwt = true

# DESTRUCTIVE full reset. Gated on super_admins + a typed "RESET"
# confirmation. Wipes all data, keeps the super-admin allowlist.
[functions.admin-reset-database]
verify_jwt = true

# Atlas operations — venue profile research + enrichment, owned by
# admins. Reads/writes the Atlas Storage bucket; see the Atlas concept
# notes for the snapshot model.
[functions.admin-get-settings]
verify_jwt = true

[functions.admin-set-atlas-pre-read]
verify_jwt = true

[functions.admin-snapshot-mesita]
verify_jwt = true
