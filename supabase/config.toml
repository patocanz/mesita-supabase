# Supabase project config — Mesita
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "yjalywfzdelacdzccpgb"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
# MFA — required only for admin sign-in, kept available so businesses can
# enrol if they want. Admin-side enforcement lives in admin-signin-email.
enable_manual_linking = false

# Email — password only. No magic link, no email OTP. Consumers don't get
# email auth at all; business + admin live here.
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Phone — Twilio Verify, Mexico template at signup. Consumers + staff sign
# in here; businesses + admins never see this provider.
[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your Mesita code is {{ .Code }}"
max_frequency = "60s"

[auth.sms.twilio]
enabled = true
account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

# OAuth providers — all explicitly disabled. Spec: no Google, no Apple.
[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"

# Per-function overrides. Naming rule: <caller>-<verb>-<noun> (e.g.
# business-create-unit, consumer-list-tickets). All functions verify the
# JWT except the truly public catalog reads, which rely on RLS to gate
# visibility instead.

# --- Sign-in / accept-invite (post-signin housekeeping per role) ---
#
# These run AFTER the Supabase Auth call lands a session. They set
# app_metadata.role, create the corresponding profile row, and (admin)
# enforce @canzeco.com + MFA. verify_jwt = true gates each to a real
# session.

[functions.admin-signin-email]
verify_jwt = true

[functions.business-signin-email]
verify_jwt = true

[functions.consumer-signin-phone]
verify_jwt = true

[functions.business-accept-invite]
verify_jwt = true

[functions.staff-accept-invite]
verify_jwt = true

# --- Consumer (public reads + authed writes) ---

# Public catalog reads. RLS enforces which venue statuses are visible.
[functions.consumer-list-venues]
verify_jwt = false

[functions.consumer-get-venue]
verify_jwt = false

# Personalised discovery surfaces. JWT required so we can read the
# consumer's class + history; the recommendation logic still respects
# RLS for venue visibility.
[functions.consumer-recommend-catalog]
verify_jwt = true

[functions.consumer-recommend-deck]
verify_jwt = true

# --- Artificial callers (recommender-*) ---
#
# Internal-only services with no end user. Natural-caller EFs invoke them
# with the service-role bearer + an X-Internal-Caller header; the gateway
# is open (verify_jwt = false) and authentication happens inside the EF
# via _shared/internal.ts → requireInternalCaller. Never exposed to the
# web — clients call the natural-caller EFs which delegate here.

[functions.recommender-rank-deck]
verify_jwt = false

[functions.recommender-rank-catalog]
verify_jwt = false

# Artificial callers (places-*) — Google Places proxy split. The Google
# key (SUPA_GMP_KEY) only lives inside these EFs; natural callers forward
# requests through invokeArtificialCaller.

[functions.places-suggest-autocomplete]
verify_jwt = false

[functions.places-search-text]
verify_jwt = false

[functions.places-get-details]
verify_jwt = false

# Authed consumer writes / reads tied to the signed-in consumer's own data.
[functions.consumer-get-profile]
verify_jwt = true

[functions.consumer-update-profile]
verify_jwt = true

[functions.consumer-list-tickets]
verify_jwt = true

[functions.consumer-submit-story]
verify_jwt = true

[functions.consumer-delete-account]
verify_jwt = true

