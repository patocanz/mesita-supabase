# Supabase project config — Mesita
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "yjalywfzdelacdzccpgb"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"

# Per-function overrides — keeps GitHub auto-deploys honest about which
# functions are public vs. JWT-protected.
[functions.hello-world]
verify_jwt = false

# Google Places proxies. Reads google_places_api_key secret server-side
# and returns shape-normalised JSON to the web client.
[functions.places-autocomplete]
verify_jwt = true

[functions.places-details]
verify_jwt = true

# Venue catalog reads. Public — guests can browse without an account; the
# venues RLS policy enforces which statuses are visible.
[functions.venues-list]
verify_jwt = false

# Single-venue detail read. Public; same RLS gate as venues-list.
[functions.guest-get-venue]
verify_jwt = false

# Venue creation. JWT-protected. Receives a Google placeId, enriches via
# Places + Firecrawl + Perplexity + OpenAI in one pass, writes via service
# role. Self-contained — does NOT call other Edge Functions.
[functions.venues-enrich-create]
verify_jwt = true

# Venue update. JWT-protected; the function itself verifies that the caller
# is a member of the venue before mutating any column.
[functions.venues-update]
verify_jwt = true

# One-shot bundle for the manager + validator surfaces: user + venues +
# active venue + recent tickets. Replaces multiple per-page calls so
# sidebar navigation is a single Edge Function round trip.
[functions.unit-overview]
verify_jwt = true

# Manager-scoped venue read. Kept for non-manager surfaces that still need
# a venue list without the heavy join.
[functions.venues-mine]
verify_jwt = true

# Guest profile (creates the guest row on first call + returns balance + code).
[functions.guest-profile]
verify_jwt = true

# Ticket workflow. JWT-protected; each function does its own membership check
# and writes via the service role. Self-contained — no Edge-to-Edge calls.
[functions.tickets-venue-create]
verify_jwt = true

[functions.tickets-mark-paid]
verify_jwt = true

[functions.tickets-mine]
verify_jwt = true

[functions.tickets-venue-recent]
verify_jwt = true

# Manager utilities (new <caller>-<verb>-<noun> naming convention).
# manager-lookup-guest: resolve a 6-char guest code to display name + balance.
# manager-cancel-ticket: cancel a pending_pay ticket with a reason.
[functions.manager-lookup-guest]
verify_jwt = true

[functions.manager-cancel-ticket]
verify_jwt = true

# Guest writes their own onboarding details (name, sex, birthday, country,
# phone). Auto-creates the guest row on first call.
[functions.guest-update-profile]
verify_jwt = true
